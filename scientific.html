<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:15px;

background:linear-gradient(
-45deg,
#0f172a,
#1e3a8a,
#7c3aed,
#0f172a
);

background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.calculator{
width:100%;
max-width:420px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(15px);

padding:20px;

border-radius:25px;

border:1px solid rgba(255,255,255,0.15);

box-shadow:
0 0 25px rgba(0,255,255,0.25),
0 0 50px rgba(124,58,237,0.25);

animation:floatCard 4s ease-in-out infinite;
}

@keyframes floatCard{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-6px);
}
}

h1{
text-align:center;
color:white;
margin-bottom:15px;

text-shadow:
0 0 10px cyan,
0 0 20px cyan;
}

#display{
width:100%;
height:70px;

border:none;

border-radius:15px;

padding:15px;

font-size:28px;

text-align:right;

background:#0f172a;

color:white;

margin-bottom:15px;

outline:none;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
}

button{
height:55px;

border:none;

border-radius:12px;

cursor:pointer;

font-size:18px;

font-weight:bold;

color:white;

background:linear-gradient(
135deg,
#06b6d4,
#3b82f6
);

transition:.25s;
}

button:hover{
transform:translateY(-3px) scale(1.04);

box-shadow:
0 0 10px cyan,
0 0 20px cyan;
}

button:active{
transform:scale(.95);
}

.equal{
background:linear-gradient(
135deg,
#22c55e,
#34754c
);
}

.clear{
background:linear-gradient(
135deg,
#ef4444,
#dc2626
);
}

.back{
display:block;
margin-top:15px;
text-align:center;
text-decoration:none;
color:white;
font-weight:bold;
}

@media(max-width:480px){

.calculator{
padding:15px;
}

button{
height:48px;
font-size:15px;
}

#display{
height:60px;
font-size:22px;
}

}

</style>
</head>

<div class="calculator">

<h1>🧮 Scientific Calculator</h1>

<input type="text" id="display" readonly>

<div class="buttons">

<!-- Row 1 -->
<button class="clear" onclick="clearDisplay()">AC</button>
<button onclick="backspace()">⌫</button>
<button onclick="appendValue('%')">%</button>
<button onclick="appendValue('/')">÷</button>

<!-- Row 2 -->
<button onclick="appendValue('7')">7</button>
<button onclick="appendValue('8')">8</button>
<button onclick="appendValue('9')">9</button>
<button onclick="appendValue('*')">×</button>

<!-- Row 3 -->
<button onclick="appendValue('4')">4</button>
<button onclick="appendValue('5')">5</button>
<button onclick="appendValue('6')">6</button>
<button onclick="appendValue('-')">−</button>

<!-- Row 4 -->
<button onclick="appendValue('1')">1</button>
<button onclick="appendValue('2')">2</button>
<button onclick="appendValue('3')">3</button>
<button onclick="appendValue('+')">+</button>

<!-- Row 5 -->
<button onclick="appendValue('0')">0</button>
<button onclick="appendValue('.')">.</button>
<button class="equal" onclick="calculate()">=</button>
<button onclick="squareRoot()">√</button>

<!-- Row 6 -->
<button onclick="square()">x²</button>
<button onclick="cube()">x³</button>
<button onclick="power()">xʸ</button>
<button onclick="inverse()">1/x</button>

<!-- Row 7 -->
<button onclick="sin()">sin</button>
<button onclick="cos()">cos</button>
<button onclick="tan()">tan</button>
<button onclick="log()">log</button>

<!-- Row 8 -->
<button onclick="ln()">ln</button>
<button onclick="factorial()">n!</button>
<button onclick="appendPi()">π</button>
<button onclick="appendE()">e</button>

<!-- Row 9 -->
<button onclick="toggleMode()">Deg</button>
<button onclick="toggleTheme()">🌙</button>
<button onclick="copyResult()">📋</button>
<button onclick="historyOpen()">📜</button>

</div>

<div id="history"></div>

<a href="index.html" class="back">
⬅ Back to MechMaster Pro
</a>

</div>
<script>

let isDegree = true;
let history = [];

function display(){
    return document.getElementById("display");
}

function appendValue(val){
    display().value += val;
}

function clearDisplay(){
    display().value = "";
}

function backspace(){
    display().value = display().value.slice(0,-1);
}

function calculate(){
    try{
        let result = eval(display().value);
        history.push(display().value + " = " + result);
        display().value = result;
    }catch{
        alert("Invalid Expression");
    }
}

function squareRoot(){
    display().value = Math.sqrt(parseFloat(display().value));
}

function square(){
    let n = parseFloat(display().value);
    display().value = Math.pow(n,2);
}

function cube(){
    let n = parseFloat(display().value);
    display().value = Math.pow(n,3);
}

function power(){
    let p = prompt("Enter Power");
    if(p!=null){
        let n = parseFloat(display().value);
        display().value = Math.pow(n,p);
    }
}

function inverse(){
    display().value = 1/parseFloat(display().value);
}

function appendPi(){
    display().value = Math.PI;
}

function appendE(){
    display().value = Math.E;
}

function sin(){
    let n=parseFloat(display().value);
    if(isDegree)
        n=n*Math.PI/180;
    display().value=Math.sin(n).toFixed(8);
}

function cos(){
    let n=parseFloat(display().value);
    if(isDegree)
        n=n*Math.PI/180;
    display().value=Math.cos(n).toFixed(8);
}

function tan(){
    let n=parseFloat(display().value);
    if(isDegree)
        n=n*Math.PI/180;
    display().value=Math.tan(n).toFixed(8);
}

function log(){
    display().value=Math.log10(parseFloat(display().value)).toFixed(8);
}

function ln(){
    display().value=Math.log(parseFloat(display().value)).toFixed(8);
}

function factorial(){

    let n=parseInt(display().value);

    if(n<0){
        alert("Invalid");
        return;
    }

    let f=1;

    for(let i=1;i<=n;i++)
        f*=i;

    display().value=f;

}

function toggleMode(){

    isDegree=!isDegree;

    alert(
        isDegree
        ?"Degree Mode"
        :"Radian Mode"
    );

}

function copyResult(){

navigator.clipboard.writeText(display().value);

alert("Copied");

}

function historyOpen(){

let h=document.getElementById("history");

if(history.length==0){

h.innerHTML="No History";

return;

}

h.innerHTML="<h3>History</h3>";

history.forEach(item=>{

h.innerHTML+="<p>"+item+"</p>";

});

}

function toggleTheme(){

document.body.classList.toggle("light");

}

document.addEventListener("keydown",function(e){

if(!isNaN(e.key) || "+-*/.%".includes(e.key))
appendValue(e.key);

if(e.key=="Enter")
calculate();

if(e.key=="Backspace")
backspace();

if(e.key=="Escape")
clearDisplay();

});

</script>

</body>
</html>
