<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:15px;

background:linear-gradient(
-45deg,
#0f172a,
#1e3a8a,
#7c3aed,
#0f172a
);

background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.calculator{
width:100%;
max-width:420px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(15px);

padding:20px;

border-radius:25px;

border:1px solid rgba(255,255,255,0.15);

box-shadow:
0 0 25px rgba(0,255,255,0.25),
0 0 50px rgba(124,58,237,0.25);

animation:floatCard 4s ease-in-out infinite;
}

@keyframes floatCard{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-6px);
}
}

h1{
text-align:center;
color:white;
margin-bottom:15px;

text-shadow:
0 0 10px cyan,
0 0 20px cyan;
}

#display{
width:100%;
height:70px;

border:none;

border-radius:15px;

padding:15px;

font-size:28px;

text-align:right;

background:#0f172a;

color:white;

margin-bottom:15px;

outline:none;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
}

button{
height:55px;

border:none;

border-radius:12px;

cursor:pointer;

font-size:18px;

font-weight:bold;

color:white;

background:linear-gradient(
135deg,
#06b6d4,
#3b82f6
);

transition:.25s;
}

button:hover{
transform:translateY(-3px) scale(1.04);

box-shadow:
0 0 10px cyan,
0 0 20px cyan;
}

button:active{
transform:scale(.95);
}

.equal{
background:linear-gradient(
135deg,
#22c55e,
#16a34a
);
}

.clear{
background:linear-gradient(
135deg,
#ef4444,
#dc2626
);
}

.back{
display:block;
margin-top:15px;
text-align:center;
text-decoration:none;
color:white;
font-weight:bold;
}

@media(max-width:480px){

.calculator{
padding:15px;
}

button{
height:48px;
font-size:15px;
}

#display{
height:60px;
font-size:22px;
}

}

</style>
</head>

<body>

<div class="calculator">

<h1>Scientific Calculator</h1>

<input type="text" id="display" readonly>

<div class="buttons">

<button onclick="appendValue('7')">7</button>
<button onclick="appendValue('8')">8</button>
<button onclick="appendValue('9')">9</button>
<button onclick="appendValue('/')">÷</button>

<button onclick="appendValue('4')">4</button>
<button onclick="appendValue('5')">5</button>
<button onclick="appendValue('6')">6</button>
<button onclick="appendValue('*')">×</button>

<button onclick="appendValue('1')">1</button>
<button onclick="appendValue('2')">2</button>
<button onclick="appendValue('3')">3</button>
<button onclick="appendValue('-')">−</button>

<button onclick="appendValue('0')">0</button>
<button onclick="appendValue('.')">.</button>
<button class="equal" onclick="calculate()">=</button>
<button onclick="appendValue('+')">+</button>

<button onclick="squareRoot()">√</button>
<button onclick="square()">x²</button>
<button onclick="appendPi()">π</button>
<button onclick="appendE()">e</button>

<button onclick="sin()">sin</button>
<button onclick="cos()">cos</button>
<button onclick="tan()">tan</button>
<button onclick="log()">log</button>

<button class="clear" onclick="clearDisplay()">C</button>

</div>

<a href="index.html" class="back">⬅ Back to MechMaster Pro</a>

</div>

<script>

function appendValue(value){
document.getElementById("display").value += value;
}

function clearDisplay(){
document.getElementById("display").value = "";
}

function calculate(){

try{

let result = eval(
document.getElementById("display").value
);

document.getElementById("display").value = result;

}
catch{

alert("Invalid Expression");

}

}

function squareRoot(){

let d=document.getElementById("display");

d.value=Math.sqrt(parseFloat(d.value));

}

function square(){

let d=document.getElementById("display");

d.value=Math.pow(parseFloat(d.value),2);

}

function appendPi(){

document.getElementById("display").value=Math.PI.toFixed(8);

}

function appendE(){

document.getElementById("display").value=Math.E.toFixed(8);

}

function sin(){

let d=document.getElementById("display");

let angle=parseFloat(d.value);

if(isNaN(angle)) return;

d.value=Math.sin(angle*Math.PI/180).toFixed(6);

}

function cos(){

let d=document.getElementById("display");

let angle=parseFloat(d.value);

if(isNaN(angle)) return;

d.value=Math.cos(angle*Math.PI/180).toFixed(6);

}

function tan(){

let d=document.getElementById("display");

let angle=parseFloat(d.value);

if(isNaN(angle)) return;

d.value=Math.tan(angle*Math.PI/180).toFixed(6);

}

function log(){

let d=document.getElementById("display");

let num=parseFloat(d.value);

if(isNaN(num) || num<=0){

alert("Enter a positive number");

return;

}

d.value=Math.log10(num).toFixed(6);

}

</script>

</body>
</html>
