<!DOCTYPE html>
<html>
<head>
<title>Scientific Calculator</title>

<style>

/* ===== FUTURISTIC SCIENTIFIC CALCULATOR ===== */

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at top left,#00ffff22,transparent 40%),
radial-gradient(circle at bottom right,#7c3aed33,transparent 40%),
linear-gradient(135deg,#020617,#0f172a,#1e293b);

overflow:hidden;
}

/* Floating Glow Background */

body::before{
content:"";
position:fixed;
width:700px;
height:700px;
background:cyan;
filter:blur(250px);
opacity:.15;
animation:floatGlow 8s infinite alternate;
}

@keyframes floatGlow{

0%{
transform:translate(-100px,-50px);
}

100%{
transform:translate(150px,100px);
}

}

/* Calculator */

.scientific-calc{

position:relative;

width:450px;

padding:30px;

border-radius:30px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,.1);

box-shadow:
0 0 30px rgba(0,255,255,.2),
0 0 80px rgba(0,255,255,.15);

animation:
cardFloat 4s ease-in-out infinite;

overflow:hidden;

}

/* RGB Animated Border */

.scientific-calc::before{

content:"";

position:absolute;

inset:-3px;

border-radius:30px;

background:
linear-gradient(
90deg,
cyan,
blue,
violet,
cyan
);

background-size:400%;

z-index:-1;

animation:
rgbBorder 8s linear infinite;

}

@keyframes rgbBorder{

0%{
background-position:0%;
}

100%{
background-position:400%;
}

}

/* Floating Card */

@keyframes cardFloat{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0);
}

}

/* Heading */

h1{

text-align:center;

margin-bottom:25px;

font-size:36px;

color:white;

text-shadow:
0 0 10px cyan,
0 0 20px cyan,
0 0 40px cyan;

}

/* Display */

#display{

width:100%;

height:80px;

font-size:32px;

text-align:right;

padding:20px;

border:none;

border-radius:20px;

background:#020617;

color:#00ffff;

margin-bottom:20px;

box-shadow:
inset 0 0 20px rgba(0,255,255,.4),
0 0 20px rgba(0,255,255,.2);

text-shadow:
0 0 10px cyan,
0 0 20px cyan;

}

/* Button Grid */

.buttons{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:12px;

}

/* Buttons */

button{

height:70px;

border:none;

border-radius:18px;

font-size:22px;

font-weight:bold;

cursor:pointer;

color:white;

background:
linear-gradient(
135deg,
#06b6d4,
#3b82f6
);

transition:.35s;

box-shadow:
0 5px 15px rgba(0,0,0,.3);

}

/* Hover */

button:hover{

transform:
translateY(-6px)
scale(1.08);

box-shadow:
0 0 15px cyan,
0 0 35px cyan,
0 0 60px cyan;

}

/* Click */

button:active{

transform:scale(.92);

}

/* Equal Button */

.equal{

background:
linear-gradient(
135deg,
#22c55e,
#16a34a
);

}

/* Clear Button */

.clear{

background:
linear-gradient(
135deg,
#ef4444,
#dc2626
);

}

/* Back Button */

.back{

display:block;

margin-top:20px;

text-align:center;

color:cyan;

text-decoration:none;

font-weight:bold;

transition:.3s;

}

.back:hover{

text-shadow:
0 0 10px cyan,
0 0 25px cyan;

}

</style>

</head>



<body>

<div class="scientific-calc">

<h1>Scientific Calculator</h1>

<input type="text" id="display" readonly>

<div class="buttons">

<button onclick="appendValue('7')">7</button>
<button onclick="appendValue('8')">8</button>
<button onclick="appendValue('9')">9</button>
<button onclick="appendValue('/')">÷</button>

<button onclick="appendValue('4')">4</button>
<button onclick="appendValue('5')">5</button>
<button onclick="appendValue('6')">6</button>
<button onclick="appendValue('*')">×</button>

<button onclick="appendValue('1')">1</button>
<button onclick="appendValue('2')">2</button>
<button onclick="appendValue('3')">3</button>
<button onclick="appendValue('-')">−</button>

<button onclick="appendValue('0')">0</button>
<button onclick="appendValue('.')">.</button>
<button class="equal" onclick="calculate()">=</button>
<button onclick="appendValue('+')">+</button>

<button onclick="squareRoot()">√</button>
<button onclick="square()">x²</button>
<button onclick="appendValue('Math.PI')">π</button>
<button onclick="appendValue('Math.E')">e</button>

<button onclick="sin()">sin</button>
<button onclick="cos()">cos</button>
<button onclick="tan()">tan</button>
<button onclick="log()">log</button>

<button class="clear" onclick="clearDisplay()">C</button>

</div>

<a href="index.html" class="back">⬅ Back to MechMaster Pro</a>

</div>

<script>
function appendValue(val){
document.getElementById("display").value+=val;
}

function clearDisplay(){
document.getElementById("display").value="";
}

function calculate(){
try{
document.getElementById("display").value=
eval(document.getElementById("display").value);
}catch{
alert("Invalid Expression");
}
}

function squareRoot(){
let d=document.getElementById("display");
d.value=Math.sqrt(eval(d.value));
}

function square(){
let d=document.getElementById("display");
d.value=Math.pow(eval(d.value),2);
}

function sin(){
let d=document.getElementById("display");
d.value=Math.sin(eval(d.value));
}

function cos(){
let d=document.getElementById("display");
d.value=Math.cos(eval(d.value));
}

function tan(){
let d=document.getElementById("display");
d.value=Math.tan(eval(d.value));
}

function log(){
let d=document.getElementById("display");
d.value=Math.log10(eval(d.value));
}
</script>

</body>

</body>
</html>
